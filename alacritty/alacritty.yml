# Window Customization
window:
  opacity: 1.0
  dimensions:
    columns: 80
    lines: 30
  padding:
    x: 15
    y: 15
  # decorations: buttonless #Still won't show in a window manger, but will in a desktop environment
  startup_mode: Maximized
  scrolling:
    history: 10000
    multiplier: 3

# Font Customization
font:
  normal:
    family: FiraCode Nerd Font
    style: Regular
  bold:
    family: FiraCode Nerd Font
    style: Bold
  italic:
    family: FiraCode Nerd Font
    style: Italic
  bold_italic:
    family: FiraCode Nerd Font 
    style: Bold Italic
  size: 20
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0
  #draw_bold_text_with_bright_colors: true


cursor:
  style:
    shape: Block
    blinking: Off

shell:
  program: /usr/local/bin/fish
